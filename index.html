<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NumSum</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD6;
    --text: #1C1917;
    --text-muted: #78716C;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-border: #9FE1CB;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-border: #F7C1C1;
    --selected-bg: #E1F5EE;
    --selected-border: #1D9E75;
    --selected-text: #0F6E56;
    --heart: #D85A30;
    --heart-empty: #D3D1C7;
    --accent: #534AB7;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    color: var(--text);
  }

  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 16px 32px;
  }

  /* ── Header ── */
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 8px;
  }

  #logo {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  #logo span { color: var(--accent); }

  #level-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
  }

  /* ── Lives ── */
  #lives-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 12px 0 20px;
  }

  .heart {
    width: 28px;
    height: 28px;
    transition: transform 0.2s;
  }

  .heart.lost {
    animation: heartbreak 0.3s ease-out forwards;
  }

  @keyframes heartbreak {
    0% { transform: scale(1); }
    40% { transform: scale(1.3); }
    100% { transform: scale(0.85); opacity: 0.4; }
  }

  /* ── Grid ── */
  #grid-wrap {
    display: grid;
    grid-template-columns: 48px repeat(4, 1fr);
    grid-template-rows: 48px repeat(4, 1fr);
    gap: 5px;
  }

  .corner { width: 48px; height: 48px; }

  .col-label, .row-label {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    min-height: 48px;
    position: relative;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .col-label.exact, .row-label.exact {
    border-color: var(--green-border);
    background: var(--green-light);
    color: var(--green);
  }

  .col-label.over, .row-label.over {
    border-color: var(--red-border);
    background: var(--red-light);
    color: var(--red);
  }

  .label-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: inherit;
    opacity: 0.65;
    position: absolute;
    bottom: 4px;
    right: 6px;
    line-height: 1;
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    min-height: 64px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    touch-action: manipulation;
  }

  .cell:active { transform: scale(0.94); }

  .cell.selected {
    background: var(--selected-bg);
    border-color: var(--selected-border);
    color: var(--selected-text);
    font-weight: 500;
  }

  .cell.over-selected {
    background: var(--red-light);
    border-color: var(--red-border);
    color: var(--red);
  }

  .cell.selected-pop {
    animation: cellpop 0.18s ease-out;
  }

  @keyframes cellpop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* ── Message area ── */
  #msg-area {
    min-height: 28px;
    margin-top: 16px;
    text-align: center;
  }

  #message {
    font-size: 14px;
    color: var(--red);
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s;
  }

  #message.show { opacity: 1; }

  /* ── Win screen ── */
  #win-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 28px;
    gap: 8px;
    animation: fadein 0.4s ease-out;
  }

  #win-screen.show { display: flex; }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #win-emoji {
    font-size: 48px;
    line-height: 1;
  }

  #win-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--green);
    margin-top: 4px;
  }

  #win-sub {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ── Buttons ── */
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, transform 0.1s;
    margin-top: 12px;
  }

  .btn:active { transform: scale(0.97); }
  .btn:hover { background: var(--bg); }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .btn-primary:hover { background: #3C3A36; }

  /* ── Game over ── */
  #gameover-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 28px;
    gap: 8px;
    animation: fadein 0.4s ease-out;
  }

  #gameover-screen.show { display: flex; }

  #gameover-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--red);
    margin-top: 4px;
  }

  #gameover-sub {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ── Mode toggle ── */
  #mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .mode-btn {
    flex: 1;
    padding: 8px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
</style>
</head>
<body>
<div id="app">
  <div id="top-bar">
    <div id="logo">Num<span>Sum</span></div>
    <div id="level-badge">Level 1</div>
  </div>

  <div id="mode-row">
    <button class="mode-btn active" id="btn-lives" onclick="setMode('lives')">❤ Lives mode</button>
    <button class="mode-btn" id="btn-free" onclick="setMode('free')">☁ Free mode</button>
  </div>

  <div id="lives-row"></div>

  <div id="grid-wrap"></div>

  <div id="msg-area">
    <div id="message"></div>
  </div>

  <div id="win-screen">
    <div id="win-emoji">🎉</div>
    <div id="win-title">Puzzle solved!</div>
    <div id="win-sub">All rows and columns match.</div>
    <button class="btn btn-primary" onclick="resetGame()">Play again</button>
  </div>

  <div id="gameover-screen">
    <div style="font-size:48px;line-height:1">💔</div>
    <div id="gameover-title">No lives left!</div>
    <div id="gameover-sub">Better luck next time.</div>
    <button class="btn btn-primary" onclick="resetGame()">Try again</button>
  </div>

  <button class="btn" id="reset-btn" onclick="resetGame()">Restart</button>
</div>

<script>
const LEVEL = {
  grid: [
    [5, 1, 3, 2],
    [4, 4, 1, 8],
    [4, 6, 1, 3],
    [5, 7, 7, 1]
  ],
  colTargets: [4, 14, 2, 3],
  rowTargets: [3, 5, 7, 8]
};

let lives = 3;
let selected = Array.from({length:4}, () => Array(4).fill(false));
let gameOver = false;
let won = false;
let mode = 'lives';

function setMode(m) {
  mode = m;
  document.getElementById('btn-lives').classList.toggle('active', m === 'lives');
  document.getElementById('btn-free').classList.toggle('active', m === 'free');
  resetGame();
}

function heartSVG(full) {
  const col = full ? '#D85A30' : '#D3D1C7';
  return `<svg class="heart" viewBox="0 0 24 24" fill="${col}" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
}

function renderLives() {
  const el = document.getElementById('lives-row');
  if (mode === 'free') { el.innerHTML = ''; return; }
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const wrap = document.createElement('div');
    wrap.innerHTML = heartSVG(i < lives);
    if (i >= lives) wrap.querySelector('svg').classList.add('lost');
    el.appendChild(wrap.firstChild);
  }
}

function getRowSum(r) {
  let s = 0;
  for (let c = 0; c < 4; c++) if (selected[r][c]) s += LEVEL.grid[r][c];
  return s;
}

function getColSum(c) {
  let s = 0;
  for (let r = 0; r < 4; r++) if (selected[r][c]) s += LEVEL.grid[r][c];
  return s;
}

function labelState(sum, target) {
  if (sum === target) return 'exact';
  if (sum > target) return 'over';
  return '';
}

function checkWin() {
  for (let r = 0; r < 4; r++) if (getRowSum(r) !== LEVEL.rowTargets[r]) return false;
  for (let c = 0; c < 4; c++) if (getColSum(c) !== LEVEL.colTargets[c]) return false;
  return true;
}

function showMessage(txt) {
  const el = document.getElementById('message');
  el.textContent = txt;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

function render() {
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';
  wrap.appendChild(Object.assign(document.createElement('div'), {className: 'corner'}));

  for (let c = 0; c < 4; c++) {
    const lbl = document.createElement('div');
    lbl.className = 'col-label';
    const cs = getColSum(c);
    const st = labelState(cs, LEVEL.colTargets[c]);
    if (st) lbl.classList.add(st);
    lbl.textContent = LEVEL.colTargets[c];
    if (cs > 0 && !won) {
      const sub = document.createElement('span');
      sub.className = 'label-sub';
      sub.textContent = cs;
      lbl.appendChild(sub);
    }
    wrap.appendChild(lbl);
  }

  for (let r = 0; r < 4; r++) {
    const rowLbl = document.createElement('div');
    rowLbl.className = 'row-label';
    const rs = getRowSum(r);
    const rst = labelState(rs, LEVEL.rowTargets[r]);
    if (rst) rowLbl.classList.add(rst);
    rowLbl.textContent = LEVEL.rowTargets[r];
    if (rs > 0 && !won) {
      const sub = document.createElement('span');
      sub.className = 'label-sub';
      sub.textContent = rs;
      rowLbl.appendChild(sub);
    }
    wrap.appendChild(rowLbl);

    for (let c = 0; c < 4; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = LEVEL.grid[r][c];

      const rs2 = getRowSum(r);
      const cs2 = getColSum(c);
      const isOver = selected[r][c] && (rs2 > LEVEL.rowTargets[r] || cs2 > LEVEL.colTargets[c]);

      if (selected[r][c]) cell.classList.add(isOver ? 'over-selected' : 'selected');

      if (!gameOver && !won) {
        cell.addEventListener('click', () => toggleCell(r, c));
      }
      wrap.appendChild(cell);
    }
  }
}

function toggleCell(r, c) {
  if (gameOver || won) return;
  const wasSelected = selected[r][c];
  selected[r][c] = !wasSelected;

  const rs = getRowSum(r);
  const cs = getColSum(c);

  if (!wasSelected && (rs > LEVEL.rowTargets[r] || cs > LEVEL.colTargets[c])) {
    if (mode === 'lives') {
      lives--;
      renderLives();
      showMessage('Over the target — lost a life!');
      if (lives <= 0) {
        gameOver = true;
        document.getElementById('gameover-screen').classList.add('show');
        document.getElementById('reset-btn').style.display = 'none';
      }
    }
  }

  if (!gameOver && checkWin()) {
    won = true;
    document.getElementById('win-screen').classList.add('show');
    document.getElementById('reset-btn').style.display = 'none';
  }

  render();
}

function resetGame() {
  lives = 3;
  selected = Array.from({length:4}, () => Array(4).fill(false));
  gameOver = false;
  won = false;
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('gameover-screen').classList.remove('show');
  document.getElementById('reset-btn').style.display = 'block';
  document.getElementById('message').classList.remove('show');
  renderLives();
  render();
}

renderLives();
render();
</script>
</body>
</html>
