<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Character encoding — tells the browser to expect standard modern text -->
  <meta charset="UTF-8">

  <!-- Viewport — makes the page fit mobile screens properly and disables pinch-to-zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>NumSum</title>

  <!-- Google Fonts — loads DM Sans (the main text) and DM Mono (for numbers in the grid) -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Main stylesheet — all colours, layout, and visual styling lives here -->
  <link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     APP SHELL
     The outer wrapper for the whole game. Only one screen is
     visible at a time — switching is handled by app.js.
════════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ═══════════════════════════════════════════════════════════
       MAP SCREEN
       The level select screen. Shows all levels grouped into
       sections, with pagination. This is the first thing the
       player sees when they open the game.
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-map" class="screen">

    <!-- Top bar: logo on the left, points + icon buttons on the right -->
    <div id="map-top">
      <div id="logo">Num<span>Sum</span></div>
      <div id="map-top-right">

        <!-- Points display — star icon + current point total -->
        <div id="points-display">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px;color:var(--points-color)">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span id="points-count">0</span>
        </div>

        <!-- Profile button — person silhouette icon -->
        <button class="icon-btn" onclick="showScreen('profile')" title="Profile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>

        <!-- Themes shop button — paint palette icon -->
        <button class="icon-btn" onclick="showScreen('shop-themes')" title="Themes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="13.5" cy="6.5" r="1.5"/>
            <circle cx="17.5" cy="10.5" r="1.5"/>
            <circle cx="8.5" cy="7.5" r="1.5"/>
            <circle cx="6.5" cy="12.5" r="1.5"/>
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 011.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
          </svg>
        </button>

        <!-- Companions shop button — paw print icon -->
        <button class="icon-btn" onclick="showScreen('shop-companions')" title="Companions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="6"   cy="7.5" rx="2"   ry="2.5"/>
            <ellipse cx="10"  cy="5.5" rx="2"   ry="2.5"/>
            <ellipse cx="14"  cy="5.5" rx="2"   ry="2.5"/>
            <ellipse cx="18"  cy="7.5" rx="2"   ry="2.5"/>
            <path d="M12 22c-4 0-7-2-7-5 0-1.5.8-2.8 2-3.7.8-.6 1.5-1.5 2-2.3h6c.5.8 1.2 1.7 2 2.3 1.2.9 2 2.2 2 3.7 0 3-3 5-7 5z"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- Legend — explains what the coloured dots on the level map mean -->
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot solved"></div>Solved</div>
      <div class="legend-item"><div class="legend-dot next"></div>Up next</div>
      <div class="legend-item"><div class="legend-dot locked"></div>Locked</div>
    </div>

    <!-- Level map — filled in by map.js when this screen is shown -->
    <div id="level-map"></div>

    <!-- Dev tools — for testing only, to be removed before public release -->
    <div id="dev-tools">
      <p class="dev-label">DEV TOOLS</p>
      <button onclick="devClear()" class="btn-dev">Clear all progress</button>
      <button id="btn-dev-unlock" onclick="devToggleUnlockAll()" class="btn-dev">Unlock all levels</button>
    </div>

  </div>


  <!-- ═══════════════════════════════════════════════════════════
       GAME SCREEN
       The actual puzzle. The grid, lives, companion, and all
       gameplay elements live here. Content is built by game.js.
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-game" class="screen">

    <!-- Top bar: back button, level number, points + shop icons -->
    <div id="game-top">
      <button class="back-btn" onclick="showScreen('map')">← Levels</button>
      <div id="game-level-badge">Level 1</div>
      <div id="game-top-right">

        <!-- Points display -->
        <div id="points-display-game" class="points-pill">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--points-color);flex-shrink:0;">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span id="points-count-game">0</span>
        </div>

        <!-- Themes shop button — paint palette icon -->
        <button class="icon-btn" onclick="showScreen('shop-themes')" title="Themes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="13.5" cy="6.5" r="1.5"/>
            <circle cx="17.5" cy="10.5" r="1.5"/>
            <circle cx="8.5" cy="7.5" r="1.5"/>
            <circle cx="6.5" cy="12.5" r="1.5"/>
            <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 011.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
          </svg>
        </button>

        <!-- Companions shop button — paw print icon -->
        <button class="icon-btn" onclick="showScreen('shop-companions')" title="Companions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="6"   cy="7.5" rx="2"   ry="2.5"/>
            <ellipse cx="10"  cy="5.5" rx="2"   ry="2.5"/>
            <ellipse cx="14"  cy="5.5" rx="2"   ry="2.5"/>
            <ellipse cx="18"  cy="7.5" rx="2"   ry="2.5"/>
            <path d="M12 22c-4 0-7-2-7-5 0-1.5.8-2.8 2-3.7.8-.6 1.5-1.5 2-2.3h6c.5.8 1.2 1.7 2 2.3 1.2.9 2 2.2 2 3.7 0 3-3 5-7 5z"/>
          </svg>
        </button>

      </div>
    </div>

    <!-- Mode buttons — player picks Lives (hearts, lose one if you go over)
         or Cosy (no lives, relaxed, earns half points) before starting -->
    <div id="mode-row">
      <button class="mode-btn active" id="btn-lives" onclick="setMode('lives')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px;">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>Lives
      </button>
      <button class="mode-btn" id="btn-free" onclick="setMode('free')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px;">
          <path d="M17 8C8 10 5.9 16.17 3.82 19.34a1 1 0 00.78 1.57 11.66 11.66 0 0016.39-6.32C22.14 10.3 20 7 17 8z"/>
          <path d="M8 19l4-9"/>
        </svg>Cosy
      </button>
    </div>

    <!-- Lives row — heart icons, filled in by game.js -->
    <div id="lives-row"></div>

    <!-- Companion — the little critter that sits above the grid, filled in by game.js -->
    <div id="companion-area"></div>

    <!-- The puzzle grid itself — built dynamically by game.js -->
    <div id="grid-wrap"></div>

    <!-- Message area — shows feedback like "Over the target — lost a life!" -->
    <div id="msg-area"><div id="message"></div></div>

    <!-- Win screen — shown when the player solves the puzzle -->
    <div id="win-screen">
      <div id="win-title">Puzzle solved!</div>
      <div class="sub-text" id="win-sub"></div>       <!-- e.g. "Level 3 complete! ★★☆" -->
      <div id="points-earned-display"></div>           <!-- e.g. "+25 pts" -->
      <button class="btn btn-green" id="next-btn" onclick="nextLevel()">Next level →</button>
      <button class="btn" onclick="resetGame()">Play again</button>
      <button class="btn" onclick="showScreen('map')">Back to levels</button>
    </div>

    <!-- Game over screen — shown when the player runs out of lives -->
    <div id="gameover-screen">
      <div id="gameover-title">No lives left!</div>
      <div class="sub-text" id="gameover-sub">You lost <span id="revive-cost-display"></span> points to restart.</div>
      <!-- Revive button only shown if the player can afford it -->
      <button class="btn btn-primary" id="revive-btn" onclick="spendPointsRevive()">Revive (−<span id="revive-cost-label"></span> pts)</button>
      <button class="btn" onclick="resetGame()">Restart for free</button>
      <button class="btn" onclick="showScreen('map')">Back to levels</button>
    </div>

    <!-- Restart button — always visible during play, hidden on win/game over screens -->
    <button class="btn" id="reset-btn" onclick="resetGame()">Restart</button>

  </div>


  <!-- ═══════════════════════════════════════════════════════════
       PROFILE SCREEN
       Shows the player's stats, and lets them pick their active
       companion and theme. Content is built by player.js.
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-profile" class="screen">
    <div id="profile-top">
      <button class="back-btn" onclick="showScreen('map')">← Back</button>
      <div class="screen-title">Profile</div>
    </div>
    <!-- Profile content filled in by player.js -->
    <div id="profile-content"></div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════
       THEMES SHOP SCREEN
       Lists all available themes — regular and pride.
       Content is built by shop.js.
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-shop-themes" class="screen">
    <div class="shop-top">
      <button class="back-btn" onclick="showScreen('map')">← Back</button>
      <div class="screen-title">Themes</div>
      <!-- Points pill — so the player knows what they can afford -->
      <div class="points-pill">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--points-color);flex-shrink:0;">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span id="shop-themes-points-count">0</span>
      </div>
    </div>
    <!-- Shop content filled in by shop.js -->
    <div id="shop-themes-content"></div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════
       COMPANIONS SHOP SCREEN
       Lists all purchasable companion critters.
       Content is built by shop.js.
  ════════════════════════════════════════════════════════════ -->
  <div id="screen-shop-companions" class="screen">
    <div class="shop-top">
      <button class="back-btn" onclick="showScreen('map')">← Back</button>
      <div class="screen-title">Companions</div>
      <!-- Points pill — so the player knows what they can afford -->
      <div class="points-pill">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--points-color);flex-shrink:0;">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span id="shop-companions-points-count">0</span>
      </div>
    </div>
    <!-- Shop content filled in by shop.js -->
    <div id="shop-companions-content"></div>
  </div>


</div>

<!-- ═══════════════════════════════════════════════════════════════
     SCRIPTS
     Loaded in this order because each file depends on the one
     before it:
       levels.js — all the puzzle data
       store.js  — saving/loading from the browser's local storage
       game.js   — puzzle logic and grid rendering
       map.js    — level select screen
       player.js — profile screen
       shop.js   — shop screens and item definitions
       app.js    — screen routing and app startup (runs last)
════════════════════════════════════════════════════════════════ -->
<script src="js/levels/01_warmup.js"></script>
<script src="js/levels/02_classic.js"></script>
<script src="js/levels/03_challenge.js"></script>
<script src="js/levels/04_expert.js"></script>
<script src="js/levels/05_skillissue.js"></script>
<script src="js/levels/06_wtf.js"></script>
<script src="js/levels.js"></script>
<script src="js/store.js"></script>
<script src="js/game.js"></script>
<script src="js/map.js"></script>
<script src="js/player.js"></script>
<script src="js/shop.js"></script>
<script src="js/app.js"></script>
</body>
</html>
