<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NumSum</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- MAP SCREEN -->
  <div id="screen-map" class="screen">
    <div id="map-top">
      <div id="logo">Num<span>Sum</span></div>
      <div id="map-top-right">
        <div id="points-display">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:3px;color:var(--points-color)">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span id="points-count">0</span>
        </div>
        <button class="icon-btn" onclick="showScreen('profile')" title="Profile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="showScreen('shop-themes')" title="Themes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2"  x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="5"  y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="showScreen('shop-companions')" title="Companions">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot solved"></div>Solved</div>
      <div class="legend-item"><div class="legend-dot next"></div>Up next</div>
      <div class="legend-item"><div class="legend-dot locked"></div>Locked</div>
    </div>
    <div id="level-map"></div>
    <div id="dev-tools">
      <p class="dev-label">DEV TOOLS</p>
      <button onclick="devClear()" class="btn-dev">Clear all progress</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div id="game-top">
      <button class="back-btn" onclick="showScreen('map')">← Levels</button>
      <div id="game-level-badge">Level 1</div>
    </div>
    <div id="mode-row">
      <button class="mode-btn active" id="btn-lives" onclick="setMode('lives')">❤ Lives</button>
      <button class="mode-btn" id="btn-free" onclick="setMode('free')">☁ Free</button>
    </div>
    <div id="lives-row"></div>
    <div id="companion-area"></div>
    <div id="grid-wrap"></div>
    <div id="msg-area"><div id="message"></div></div>
    <div id="win-screen">
      <div id="win-emoji">🎉</div>
      <div id="win-title">Puzzle solved!</div>
      <div class="sub-text" id="win-sub"></div>
      <div id="points-earned-display"></div>
      <button class="btn btn-green" id="next-btn" onclick="nextLevel()">Next level →</button>
      <button class="btn" onclick="resetGame()">Play again</button>
      <button class="btn" onclick="showScreen('map')">Back to levels</button>
    </div>
    <div id="gameover-screen">
      <div style="font-size:48px;line-height:1">💔</div>
      <div id="gameover-title">No lives left!</div>
      <div class="sub-text" id="gameover-sub">You lost <span id="revive-cost-display"></span> points to restart.</div>
      <button class="btn btn-primary" id="revive-btn" onclick="spendPointsRevive()">Revive (−<span id="revive-cost-label"></span> pts)</button>
      <button class="btn" onclick="resetGame()">Restart for free</button>
      <button class="btn" onclick="showScreen('map')">Back to levels</button>
    </div>
    <button class="btn" id="reset-btn" onclick="resetGame()">Restart</button>
  </div>

  <!-- PROFILE SCREEN -->
  <div id="screen-profile" class="screen">
    <div id="profile-top">
      <button class="back-btn" onclick="showScreen('map')">← Back</button>
      <div class="screen-title">Profile</div>
    </div>
    <div id="profile-content"></div>
  </div>

  <!-- THEMES SHOP SCREEN -->
  <div id="screen-shop-themes" class="screen">
    <div id="shop-themes-top" class="shop-top">
      <button class="back-btn" onclick="showScreen('map')">← Back</button>
      <div class="screen-title">Themes</div>
      <div class="shop-points-display">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--points-color)">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span id="shop-themes-points-count">0</span>
      </div>
    </div>
    <div id="shop-themes-content"></div>
  </div>

  <!-- COMPANIONS SHOP SCREEN -->
  <div id="screen-shop-companions" class="screen">
    <div id="shop-companions-top" class="shop-top">
      <button class="back-btn" onclick="showScreen('map')">← Back</button>
      <div class="screen-title">Companions</div>
      <div class="shop-points-display">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--points-color)">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span id="shop-companions-points-count">0</span>
      </div>
    </div>
    <div id="shop-companions-content"></div>
  </div>

</div>
<script src="js/levels.js"></script>
<script src="js/store.js"></script>
<script src="js/game.js"></script>
<script src="js/map.js"></script>
<script src="js/player.js"></script>
<script src="js/shop.js"></script>
<script src="js/app.js"></script>
</body>
</html>
